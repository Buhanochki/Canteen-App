{% extends 'base/base.html' %}
{% block title %} Отчеты {% endblock %}
{% block body %}
<div class="container p-0 m-0">
    <div class="card mb-2 shadow-sm w-100">
        <div class="card-body d-flex gap-2 p-2">
            <a type="button" class="btn btn-primary flex-fill" href=""><b>Отчеты</b></a>
            <a type="button" class="btn btn-outline-primary flex-fill" href="{% url 'purchase-admin' %}"><b>Закупки</b></a>
        </div>
    </div>

    <div class="card p-2 mb-2">
        <div class="container p-0 d-flex justify-items-between gap-2">
            <a type="button" class="btn btn-outline-primary flex-fill" href="{% url 'report-meal' prev_day_link %}"><</a>
            <div class="card p-2 w-50">
                {{date}}
            </div>
            <a type="button" class="btn btn-outline-primary flex-fill" href="{% url 'report-meal' next_day_link %}">></a>
        </div>
    </div>

    {% for report in reports %}
    <div class="card mb-2">
        <div class="card-body d-flex justify-content-between">
            <div><b>Пользователь:</b> {{report.user}} </div>
            <div><b>Ингредиент:</b> {{report.ingredient}}</div>
            <div><b>Количество:</b> {{report.amount}}</div>
        </div>
    </div>
    {% endfor %}
    
    
</div>
{% endblock %}
